<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoAdapter Nexus</title>
    <base href="/" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="_content/NeoAdapter.Frontend.BlazorShared/css/sketch.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="NeoAdapter.Frontend.WebBlazor.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <!-- Ambient grid overlay during load -->
        <div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0910; color: #e8e3f5; font-family: 'Syne', sans-serif;">
            <div style="text-align: center;">
                <div style="font-size: 32px; font-weight: 800; letter-spacing: -1px; background: linear-gradient(135deg, #d9bfff, #a66dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px;">NEOADAPTER</div>
                <div style="font-family: 'DM Mono', monospace; font-size: 11px; color: #5e5878; letter-spacing: 0.15em;">BOOTING NEXUS ENGINE...</div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
